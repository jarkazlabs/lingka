<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lingka Field</title>
<style>
:root{color:#3f382c;background:#5f5849;font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif}*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden}.app{position:relative;width:100vw;height:100vh;padding:16px 256px 76px;overflow:hidden;background:radial-gradient(circle at 9% 20%,#e1d6bc42,transparent 24%),radial-gradient(circle at 88% 72%,#454d3d33,transparent 28%),linear-gradient(140deg,#756e5d,#8b836f 36%,#5c584a)}.app:after{position:absolute;inset:0;pointer-events:none;content:"";box-shadow:inset 0 0 90px #28241c7a}.panel{position:absolute;z-index:5;top:16px;bottom:76px;width:220px;padding:24px 18px;color:#443929;background:linear-gradient(145deg,#e7dec7db,#cdc2a8cc),radial-gradient(circle at 20% 16%,#fffae1b8,transparent 34%);border:1px solid #4e433029;border-radius:10px;box-shadow:0 14px 38px #36302440,inset 0 1px #ffebe861}.left{left:16px}.right{right:16px}.brand{text-align:center;padding-bottom:22px;margin-bottom:22px;border-bottom:1px solid #4e433024}.mark{position:relative;width:34px;height:34px;margin:4px auto 14px}.mark span{position:absolute;width:13px;height:13px;border:1px solid #433929b8;transform:rotate(45deg)}.mark span:nth-child(1){top:0;left:10px}.mark span:nth-child(2){top:10px;left:0}.mark span:nth-child(3){top:10px;right:0}.mark span:nth-child(4){bottom:0;left:10px}.brand h1{margin:0;font-size:1.45rem;font-weight:400;letter-spacing:.42em;text-transform:uppercase}.brand p,.kicker{font:10px ui-sans-serif,system-ui,sans-serif;letter-spacing:.13em;text-transform:uppercase}.section{padding-bottom:20px;margin-bottom:22px;border-bottom:1px solid #4e433024}.section:last-child{border:0}.heading{margin:0 0 14px;font:11px ui-sans-serif,system-ui,sans-serif;letter-spacing:.12em;text-transform:uppercase}.row,.detail{display:flex;align-items:center;gap:12px;min-height:58px;padding:10px;margin-bottom:10px;background:#f4ecd447;border:1px solid #4e43301f;border-radius:8px}.sigil{flex:none;width:32px;height:32px;border:1px solid #fffadfb3;border-radius:999px;background:radial-gradient(circle at 38% 30%,#ffffeee6,transparent 12%),radial-gradient(circle,var(--c),#2f281b 72%);box-shadow:0 0 0 4px color-mix(in srgb,var(--c),transparent 82%)}.row strong,.detail strong{display:block;font-size:.94rem;font-weight:500}.row small,.detail small{display:block;margin-top:3px;font:11px ui-sans-serif,system-ui,sans-serif;color:#443929ad}.drone{--c:#758656}.tape{--c:#b57d2d}.drift{--c:#557486}.field{position:absolute;inset:14px 256px 86px;overflow:hidden;cursor:crosshair;touch-action:none;background:radial-gradient(circle at 50% 46%,#f8f0d8c7,#e4dac09e 42%,#c4baa057),linear-gradient(145deg,#dfd3b7eb,#beb59de6);border:1px solid #3e36282e;border-radius:9px;box-shadow:0 18px 58px #2b261c57,inset 0 0 0 1px #fffdeb38,inset 0 0 72px #534b3938}.paper,.grid,.mandala,.living,.overlay{position:absolute;inset:0;pointer-events:none}.paper{opacity:.72;mix-blend-mode:multiply;background:radial-gradient(circle at 18% 68%,#727e601f,transparent 22%),radial-gradient(circle at 78% 33%,#ad7a3a1c,transparent 24%),repeating-radial-gradient(ellipse at 28% 74%,#544d3a2b 0 1px,transparent 2px 8px)}.field:before,.field:after{position:absolute;inset:0;pointer-events:none;content:""}.field:before{background-image:linear-gradient(#4e44310f 1px,transparent 1px),linear-gradient(90deg,#4e44310b 1px,transparent 1px);background-size:128px 128px;mask-image:radial-gradient(circle,#000,#0000 74%)}.field:after{opacity:.18;background-image:radial-gradient(circle at 15% 35%,#fffff5e6 0 1px,transparent 1.5px),radial-gradient(circle at 72% 27%,#483e2de6 0 1px,transparent 1.5px);background-size:167px 139px,211px 173px}.grid{inset:8% 12%;opacity:.34;border:1px solid #5046330f;border-radius:50%;background:radial-gradient(circle,transparent 0 32%,#564d3a17 32.3% 32.6%,transparent 33% 52%,#564d3a11 52.3% 52.6%,transparent 53%),repeating-conic-gradient(from 12deg,#564d3a14 0 .5deg,transparent .5deg 18deg);mask-image:radial-gradient(circle,transparent 0 10%,#000 11% 72%,transparent 73%)}.mandala{top:50%;left:50%;inset:auto;width:min(48vw,56vh);aspect-ratio:1;border-radius:50%;opacity:.22;transform:translate(-50%,-50%);background:radial-gradient(circle,transparent 0 9%,#554c392e 9.4% 9.8%,transparent 10.2% 22%,#554c3924 22.4% 22.8%,transparent 23.2%),repeating-conic-gradient(from 0deg,#554c3929 0 .7deg,transparent .7deg 30deg)}.node{position:absolute;z-index:3;display:grid;place-items:center;width:var(--s);height:var(--s);padding:0;border:0;border-radius:999px;background:transparent;color:#433827;cursor:grab;touch-action:none;transform:translate(-50%,-50%)}.node:active{cursor:grabbing}.aura,.presence,.core{position:absolute;border-radius:999px;pointer-events:none}.aura{inset:-78%;opacity:.5;background:radial-gradient(circle,color-mix(in srgb,var(--c),transparent 55%),transparent 31%),repeating-radial-gradient(circle,#fffff55c 0 1px,transparent 2px 8px);filter:blur(.4px);mix-blend-mode:multiply;animation:breathe 9s ease-in-out infinite}.presence{inset:-22%;opacity:.76;background:repeating-radial-gradient(circle,color-mix(in srgb,var(--c),transparent 72%) 0 1px,transparent 2px 9px),conic-gradient(from 22deg,transparent,color-mix(in srgb,var(--c),transparent 80%),transparent 34%,#fff8d62e,transparent 72%);filter:blur(.25px);mix-blend-mode:multiply;animation:presence 14s ease-in-out infinite}.core{width:74%;height:74%;background:radial-gradient(circle at 38% 28%,#ffffeaeb,transparent 9%),radial-gradient(circle at 52% 54%,color-mix(in srgb,var(--c),#221b12 16%),#312819 66%,#18150f);border:1px solid #fffadeb8;box-shadow:0 0 0 7px color-mix(in srgb,var(--c),transparent 82%),0 0 0 16px #fffff521,0 16px 34px #362f224f,inset 0 0 22px #fff9d629;animation:core 10s ease-in-out infinite}.node[data-type=drone] .aura{animation-duration:12s}.node[data-type=tape] .aura{animation-duration:8.5s}.node[data-type=tape] .presence{opacity:.66;background:repeating-radial-gradient(circle,#5c3d1f2e 0 1px,transparent 2px 7px),conic-gradient(from 10deg,transparent,#ac74292e,transparent 42%,#563f2629,transparent 75%)}.node[data-type=drift] .aura{animation-duration:6.5s}.node[data-type=drift] .presence{animation:presenceLight 11s ease-in-out infinite}.label,.family{position:absolute;top:calc(100% + 18px);width:170px;text-align:center;text-shadow:0 1px #f4ecd1b3;pointer-events:none}.label{font-size:1.15rem;font-weight:500}.family{top:calc(100% + 42px);font:11px ui-sans-serif,system-ui,sans-serif;color:#3a3123b8}.distortion{position:absolute;left:var(--x);top:var(--y);width:var(--w);height:var(--h);opacity:calc(.16 + var(--strength)*.26);border-radius:999px;background:repeating-radial-gradient(ellipse at center,#4c443224 0 1px,transparent 2px 8px),radial-gradient(ellipse at center,#fffce247,#606f4a1c 44%,transparent 72%);filter:blur(.8px);mix-blend-mode:multiply;transform:translate(-50%,-50%) rotate(var(--a)) scale(.96);animation:tide 12s ease-in-out infinite}.distortion.strong{opacity:calc(.28 + var(--strength)*.24);background:repeating-radial-gradient(ellipse at center,#473f2f2e 0 1px,transparent 2px 7px),radial-gradient(ellipse at center,#fef2ca57,#ab752d1f 48%,transparent 74%)}.ripple{position:absolute;left:var(--x);top:var(--y);width:14px;aspect-ratio:1;border:1px solid color-mix(in srgb,var(--c),transparent 26%);border-radius:999px;box-shadow:0 0 0 1px #fffce23d,inset 0 0 9px color-mix(in srgb,var(--c),transparent 72%);filter:blur(.15px);mix-blend-mode:multiply;opacity:0;transform:translate(-50%,-50%) scale(.16);animation:ripple 2.4s ease-out forwards}.ripple:before,.ripple:after{position:absolute;inset:-42%;border:1px solid color-mix(in srgb,var(--c),transparent 48%);border-radius:inherit;content:""}.ripple:after{inset:-86%;opacity:.62}.pollen span{position:absolute;left:var(--x);top:var(--y);width:var(--s);aspect-ratio:1;border-radius:999px;background:color-mix(in srgb,var(--c),#fff7d2 42%);box-shadow:0 0 8px color-mix(in srgb,var(--c),transparent 62%);opacity:calc(.24 + var(--p)*.34);animation:pollen var(--d) ease-in-out var(--delay) infinite alternate}.overlay{z-index:2;width:100%;height:100%;overflow:visible}.field-ring{fill:none;stroke:var(--c);stroke-dasharray:.45 .8;opacity:.78;vector-effect:non-scaling-stroke;animation:fieldBreath 11s ease-in-out infinite}.field-ring ellipse{fill:#fffff517;stroke-width:.14}.field-ring circle{stroke-width:.12}.thread{fill:none;stroke-linecap:round;stroke-dasharray:.52 .74;opacity:.58;vector-effect:non-scaling-stroke;animation:threadFlow 9s linear infinite,threadBreath 6.8s ease-in-out infinite}.thread.strong{opacity:.84;stroke-dasharray:.68 .56}.flow{fill:none;stroke:#fff9dd94;stroke-linecap:round;stroke-dasharray:.16 1.08;opacity:.5;animation:threadFlow 6.4s linear infinite reverse}.audio{stroke:#a87023bd}.modulation{stroke:#375b6dad}.toolbar{position:absolute;z-index:4;right:50%;bottom:108px;display:flex;align-items:center;gap:26px;min-width:354px;padding:16px 22px;color:#3b3224eb;background:linear-gradient(135deg,#e8dec6c7,#d2c7aeb3);border:1px solid #5c503b29;border-radius:9px;box-shadow:0 18px 42px #41382930,inset 0 1px #fffcea80;transform:translateX(50%);backdrop-filter:blur(18px)}.toolbar:before,.toolbar:after{width:1px;height:52px;background:#5d523d1f;content:""}.toolbar div{text-align:center;min-width:112px}.toolbar h2{margin:3px 0 0;font-size:1.06rem;font-weight:400;letter-spacing:.18em;text-transform:uppercase}.toggle{order:2;display:grid;place-items:center;width:74px;height:74px;border:1px solid #5245312e;border-radius:999px;background:radial-gradient(circle at 45% 34%,#fffde8cc,#d2c5a8e0);box-shadow:0 12px 26px #463b2838,inset 0 1px #fffeee9e}.toggle:after{width:0;height:0;border-top:12px solid transparent;border-bottom:12px solid transparent;border-left:18px solid #5d6f42;content:"";transform:translateX(2px)}.timeline{position:absolute;z-index:5;right:256px;bottom:16px;left:16px;display:grid;grid-template-columns:156px 1fr;align-items:center;height:46px;padding:0 18px;background:#e1d8c0bf;border:1px solid #4e433024;border-radius:9px;box-shadow:0 10px 28px #3730242e;font:11px ui-sans-serif,system-ui,sans-serif;letter-spacing:.08em;text-transform:uppercase}.line{position:relative;height:1px;background:linear-gradient(90deg,transparent,#50453238,transparent)}.line i{position:absolute;top:50%;width:8px;height:8px;border-radius:999px;background:var(--c);transform:translate(-50%,-50%)}@keyframes breathe{50%{opacity:.62;transform:scale(1.04)}}@keyframes fieldBreath{50%{opacity:.95;transform:scale(1.035) rotate(.35deg)}}@keyframes ripple{0%{opacity:.42;transform:translate(-50%,-50%) scale(.18)}46%{opacity:.24}to{opacity:0;transform:translate(-50%,-50%) scale(8.6)}}@keyframes pollen{0%{transform:translate(-7px,5px)}45%{transform:translate(4px,-9px)}to{transform:translate(9px,3px)}}@keyframes threadFlow{to{stroke-dashoffset:-8}}@keyframes threadBreath{50%{opacity:.82}}@keyframes tide{50%{filter:blur(1.2px);transform:translate(-50%,-50%) rotate(var(--a)) scale(1.04,1.08)}}@keyframes presence{50%{transform:rotate(4deg) scale(1.04)}}@keyframes presenceLight{50%{transform:translate(3px,-2px) rotate(9deg) scale(1.05)}}@keyframes core{50%{box-shadow:0 0 0 9px color-mix(in srgb,var(--c),transparent 78%),0 0 0 19px #fffff529,0 18px 38px #362f2257,inset 0 0 29px #fff9d633}}@media(max-width:980px){.app{padding:12px 12px 70px}.field{inset:12px 12px 72px}.panel{display:none}.toolbar{bottom:86px;min-width:284px}.timeline{left:12px;right:12px;grid-template-columns:112px 1fr}}@media(max-width:640px){.label,.family{width:120px}.toolbar{gap:14px;min-width:252px;padding:12px 16px}.toggle{width:62px;height:62px}}
</style>
</head>
<body>
<main class="app">
<aside class="panel left"><div class="brand"><div class="mark"><span></span><span></span><span></span><span></span></div><h1>Lingka</h1><p>A sound garden</p></div><section class="section"><p class="heading">Objekte</p><div id="list"></div></section><section class="section"><p class="heading">Entdeckungen</p><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:13px">${Array.from({length:9},()=>'<span style="aspect-ratio:1;border:1px dashed #4a3f2d47;border-radius:999px"></span>').join('')}</div></section></aside>
<section class="field" id="field"><div class="paper"></div><div class="grid"></div><div class="mandala"></div><div class="living" id="living"></div><svg class="overlay" id="overlay" viewBox="0 0 100 100" preserveAspectRatio="none"></svg></section>
<aside class="panel right"><section class="section"><p class="heading">Feld-Information</p><p>Objekte beeinflussen sich durch Entfernung, Alter und Feldstärke.</p></section><section class="section"><p class="heading">Aktiver Knoten</p><div class="detail"><span class="sigil drone"></span><span><strong>Drone</strong><small>source</small></span></div></section></aside>
<aside class="toolbar"><div><p class="kicker">Living Mandala</p><h2>Lingka</h2></div><button class="toggle" aria-label="Observe"></button></aside><div class="timeline"><span>Garten-Zeitachse</span><div class="line" id="timeline"></div></div>
</main>
<script>
const objects=[{id:'drone',type:'drone',family:'source',label:'Drone',x:34,y:42,size:78,r:178,age:0,c:'#758656'},{id:'tape',type:'tape',family:'time',label:'Tape',x:70,y:45,size:70,r:154,age:0,c:'#b57d2d'},{id:'drift',type:'drift',family:'motion',label:'Drift',x:53,y:58,size:62,r:132,age:0,c:'#557486'}];
const field=document.getElementById('field'),living=document.getElementById('living'),overlay=document.getElementById('overlay'),list=document.getElementById('list'),timeline=document.getElementById('timeline');
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);const kind=(a,b)=>a.family==='motion'||b.family==='motion'?'modulation':'audio';
function relationships(){return objects.flatMap((a,i)=>objects.slice(i+1).map(b=>({a,b,d:dist(a,b),s:Math.max(0,1-dist(a,b)/(a.r+b.r)),k:kind(a,b)}))).filter(r=>r.s>0).sort((a,b)=>b.s-a.s)}
function render(){list.innerHTML=objects.map(o=>`<div class="row"><span class="sigil ${o.type}"></span><span><strong>${o.label}</strong><small>${o.family} · Alter ${Math.floor(o.age)}s</small></span></div>`).join('');timeline.innerHTML=objects.map(o=>`<i class="${o.type}" style="--c:${o.c};left:${18+o.x*.64}%"></i>`).join('');living.querySelectorAll('.distortion').forEach(e=>e.remove());const rs=relationships();rs.slice(0,5).forEach((r,i)=>{const x=(r.a.x+r.b.x)/2,y=(r.a.y+r.b.y)/2,w=Math.max(12,r.d*(1.15+r.s*.38)),h=Math.max(8,w*(.32+r.s*.22)),a=Math.atan2(r.b.y-r.a.y,r.b.x-r.a.x)*180/Math.PI;living.insertAdjacentHTML('afterbegin',`<span class="distortion ${i?'':'strong'}" style="--x:${x}%;--y:${y}%;--w:${w}%;--h:${h}%;--a:${a}deg;--strength:${r.s}"></span>`)});overlay.innerHTML=objects.map(o=>`<g class="field-ring" style="--c:${o.c};transform-origin:${o.x}% ${o.y}%"><ellipse cx="${o.x}" cy="${o.y}" rx="${o.r/18*1.18}" ry="${o.r/18*.82}"/><circle cx="${o.x}" cy="${o.y}" r="${o.r/18*.72}"/><circle cx="${o.x}" cy="${o.y}" r="${o.r/18*.46}"/><circle cx="${o.x}" cy="${o.y}" r="${o.r/18*.27}"/></g>`).join('')+rs.slice(0,4).map((r,i)=>{const cx=(r.a.x+r.b.x)/2+(r.b.y-r.a.y)*.08,cy=(r.a.y+r.b.y)/2-(r.b.x-r.a.x)*.08,d=`M ${r.a.x} ${r.a.y} Q ${cx} ${cy} ${r.b.x} ${r.b.y}`;return`<path class="thread ${r.k} ${i?'':'strong'}" d="${d}" stroke-width="${.08+r.s*.18}"/><path class="flow" d="${d}" stroke-width="${.03+r.s*.08}"/>`}).join('')}
function makeNodes(){objects.forEach(o=>{const b=document.createElement('button');b.className='node';b.dataset.type=o.type;b.style.cssText=`left:${o.x}%;top:${o.y}%;--s:${o.size}px;--c:${o.c}`;b.innerHTML='<span class="aura"></span><span class="presence"></span><span class="core"><span></span></span><span class="label">'+o.label+'</span><span class="family">'+o.family+'</span>';let off={x:0,y:0};b.onpointerdown=e=>{const r=field.getBoundingClientRect();off={x:e.clientX-r.left-o.x/100*r.width,y:e.clientY-r.top-o.y/100*r.height};b.setPointerCapture(e.pointerId)};b.onpointermove=e=>{if(!b.hasPointerCapture(e.pointerId))return;const r=field.getBoundingClientRect();o.x=Math.min(97,Math.max(3,(e.clientX-r.left-off.x)/r.width*100));o.y=Math.min(95,Math.max(5,(e.clientY-r.top-off.y)/r.height*100));b.style.left=o.x+'%';b.style.top=o.y+'%';ripple(o);render()};field.appendChild(b)})}
function ripple(o){const s=document.createElement('span');s.className='ripple';s.style.cssText=`--x:${o.x}%;--y:${o.y}%;--c:${o.c}`;living.appendChild(s);setTimeout(()=>s.remove(),2400)}
function pollen(){const p=document.createElement('div');p.className='pollen';for(let i=0;i<26;i++){const x=(13+i*29)%94,y=(19+i*37)%88,o=objects.map(o=>[o,Math.max(0,1-Math.hypot(o.x-x,o.y-y)/(o.r/12))]).sort((a,b)=>b[1]-a[1])[0];p.insertAdjacentHTML('beforeend',`<span style="--x:${x}%;--y:${y}%;--s:${1.5+i%5*.34}px;--d:${18+i%7*3}s;--delay:${-(i%11)*1.9}s;--p:${o[1]};--c:${o[0].c}"></span>`)}living.appendChild(p)}
setInterval(()=>{objects.forEach(o=>o.age++);render()},1000);pollen();makeNodes();render();
</script>
</body>
</html>
