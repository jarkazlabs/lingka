<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lingka Field</title>
<style>
:root{font-family:"Iowan Old Style",Georgia,serif;color:#433827;background:#5f5849}*{box-sizing:border-box}html,body{height:100%;margin:0;overflow:hidden}.app{position:relative;height:100vh;padding:16px 256px 76px;background:radial-gradient(circle at 9% 20%,#e1d6bc42,transparent 24%),radial-gradient(circle at 88% 72%,#454d3d33,transparent 28%),linear-gradient(140deg,#756e5d,#8b836f 36%,#5c584a)}.field{position:absolute;inset:14px 256px 86px;overflow:hidden;border:1px solid #3e36282e;border-radius:9px;background:radial-gradient(circle at 50% 46%,#f8f0d8c7,#e4dac09e 42%,#c4baa057),linear-gradient(145deg,#dfd3b7eb,#beb59de6);box-shadow:0 18px 58px #2b261c57,inset 0 0 72px #534b3938}.field:before{position:absolute;inset:0;content:"";background:radial-gradient(circle at 18% 68%,#727e601f,transparent 22%),repeating-radial-gradient(ellipse at 28% 74%,#544d3a2b 0 1px,transparent 2px 8px);mix-blend-mode:multiply}.mandala{position:absolute;top:50%;left:50%;width:min(48vw,56vh);aspect-ratio:1;border-radius:50%;opacity:.22;transform:translate(-50%,-50%);background:radial-gradient(circle,transparent 0 9%,#554c392e 9.4% 9.8%,transparent 10.2% 22%,#554c3924 22.4% 22.8%,transparent 23.2%),repeating-conic-gradient(from 0deg,#554c3929 0 .7deg,transparent .7deg 30deg)}.panel{position:absolute;z-index:5;top:16px;bottom:76px;width:220px;padding:24px 18px;background:linear-gradient(145deg,#e7dec7db,#cdc2a8cc);border:1px solid #4e433029;border-radius:10px;box-shadow:0 14px 38px #36302440}.left{left:16px}.right{right:16px}.brand{text-align:center;padding-bottom:22px;margin-bottom:22px;border-bottom:1px solid #4e433024}.brand h1{margin:0;font-size:1.45rem;font-weight:400;letter-spacing:.42em;text-transform:uppercase}.kicker,.heading{font:11px ui-sans-serif,system-ui,sans-serif;letter-spacing:.12em;text-transform:uppercase}.row{display:flex;align-items:center;gap:12px;min-height:58px;padding:10px;margin-bottom:10px;background:#f4ecd447;border:1px solid #4e43301f;border-radius:8px}.sigil{width:32px;height:32px;border:1px solid #fffadfb3;border-radius:999px;background:radial-gradient(circle at 38% 30%,#ffffeee6,transparent 12%),radial-gradient(circle,var(--c),#2f281b 72%);box-shadow:0 0 0 4px color-mix(in srgb,var(--c),transparent 82%)}.node{position:absolute;z-index:3;left:var(--x);top:var(--y);width:var(--s);height:var(--s);border:0;border-radius:999px;background:transparent;cursor:grab;transform:translate(-50%,-50%);touch-action:none}.aura,.core,.presence{position:absolute;border-radius:999px;pointer-events:none}.aura{inset:-78%;opacity:.5;background:radial-gradient(circle,color-mix(in srgb,var(--c),transparent 55%),transparent 31%),repeating-radial-gradient(circle,#fffff55c 0 1px,transparent 2px 8px);filter:blur(.4px);mix-blend-mode:multiply;animation:breathe 9s ease-in-out infinite}.presence{inset:-22%;opacity:.76;background:repeating-radial-gradient(circle,color-mix(in srgb,var(--c),transparent 72%) 0 1px,transparent 2px 9px),conic-gradient(from 22deg,transparent,color-mix(in srgb,var(--c),transparent 80%),transparent 34%,#fff8d62e,transparent 72%);animation:presence 14s ease-in-out infinite}.core{width:74%;height:74%;left:13%;top:13%;border:1px solid #fffadeb8;background:radial-gradient(circle at 38% 28%,#ffffeaeb,transparent 9%),radial-gradient(circle at 52% 54%,color-mix(in srgb,var(--c),#221b12 16%),#312819 66%,#18150f);box-shadow:0 0 0 7px color-mix(in srgb,var(--c),transparent 82%),0 0 0 16px #fffff521,0 16px 34px #362f224f,inset 0 0 22px #fff9d629;animation:core 10s ease-in-out infinite}.label,.family{position:absolute;top:calc(100% + 18px);left:50%;width:170px;text-align:center;transform:translateX(-50%);pointer-events:none}.family{top:calc(100% + 42px);font:11px ui-sans-serif,system-ui,sans-serif;color:#3a3123b8}.overlay{position:absolute;inset:0;z-index:2;pointer-events:none}.ring{fill:none;stroke:var(--c);stroke-dasharray:.45 .8;opacity:.78;animation:fieldBreath 11s ease-in-out infinite}.ring ellipse{fill:#fffff517}.thread{fill:none;stroke-linecap:round;stroke-dasharray:.52 .74;opacity:.58;animation:threadFlow 9s linear infinite,threadBreath 6.8s ease-in-out infinite}.flow{fill:none;stroke:#fff9dd94;stroke-dasharray:.16 1.08;animation:threadFlow 6.4s linear infinite reverse}.distortion{position:absolute;left:var(--x);top:var(--y);width:var(--w);height:var(--h);border-radius:999px;opacity:.32;background:repeating-radial-gradient(ellipse at center,#4c443224 0 1px,transparent 2px 8px),radial-gradient(ellipse at center,#fffce247,#606f4a1c 44%,transparent 72%);filter:blur(.8px);mix-blend-mode:multiply;transform:translate(-50%,-50%) rotate(var(--a));animation:tide 12s ease-in-out infinite}.ripple{position:absolute;left:var(--x);top:var(--y);width:14px;aspect-ratio:1;border:1px solid color-mix(in srgb,var(--c),transparent 26%);border-radius:999px;opacity:0;transform:translate(-50%,-50%) scale(.16);animation:ripple 2.4s ease-out forwards}.pollen{position:absolute;inset:0}.pollen i{position:absolute;left:var(--x);top:var(--y);width:2px;height:2px;border-radius:999px;background:color-mix(in srgb,var(--c),#fff7d2 42%);box-shadow:0 0 8px color-mix(in srgb,var(--c),transparent 62%);animation:pollen var(--d) ease-in-out var(--delay) infinite alternate}.toolbar{position:absolute;z-index:4;right:50%;bottom:108px;display:flex;align-items:center;gap:26px;min-width:354px;padding:16px 22px;background:linear-gradient(135deg,#e8dec6c7,#d2c7aeb3);border:1px solid #5c503b29;border-radius:9px;transform:translateX(50%);backdrop-filter:blur(18px)}.play{width:74px;height:74px;border:1px solid #5245312e;border-radius:999px;background:radial-gradient(circle at 45% 34%,#fffde8cc,#d2c5a8e0)}.play:after{display:block;width:0;height:0;margin:24px auto;border-top:12px solid transparent;border-bottom:12px solid transparent;border-left:18px solid #5d6f42;content:""}.timeline{position:absolute;z-index:5;right:256px;bottom:16px;left:16px;height:46px;padding:15px 18px;color:#fff;background:#050505;border:1px solid #000;border-radius:9px;font:11px ui-sans-serif,system-ui,sans-serif;letter-spacing:.08em;text-transform:uppercase}@keyframes breathe{50%{opacity:.62;transform:scale(1.04)}}@keyframes fieldBreath{50%{opacity:.95;transform:scale(1.035) rotate(.35deg)}}@keyframes threadFlow{to{stroke-dashoffset:-8}}@keyframes threadBreath{50%{opacity:.82}}@keyframes presence{50%{transform:rotate(4deg) scale(1.04)}}@keyframes core{50%{box-shadow:0 0 0 9px color-mix(in srgb,var(--c),transparent 78%),0 0 0 19px #fffff529,0 18px 38px #362f2257,inset 0 0 29px #fff9d633}}@keyframes tide{50%{filter:blur(1.2px);transform:translate(-50%,-50%) rotate(var(--a)) scale(1.06)}}@keyframes ripple{0%{opacity:.42;transform:translate(-50%,-50%) scale(.18)}to{opacity:0;transform:translate(-50%,-50%) scale(8.6)}}@keyframes pollen{0%{transform:translate(-7px,5px)}to{transform:translate(9px,3px)}}@media(max-width:980px){.app{padding:12px 12px 70px}.field{inset:12px 12px 72px}.panel{display:none}.toolbar{bottom:86px;min-width:284px}.timeline{left:12px;right:12px}}
</style>
</head>
<body><main class="app"><aside class="panel left"><div class="brand"><h1>Lingka</h1><p class="kicker">A sound garden</p></div><p class="heading">Objekte</p><div id="list"></div></aside><section class="field" id="field"><div class="mandala"></div><div id="living"></div><svg class="overlay" id="overlay" viewBox="0 0 100 100" preserveAspectRatio="none"></svg><div class="pollen" id="pollen"></div></section><aside class="panel right"><p class="heading">Feld-Information</p><p>Objekte beeinflussen sich durch Entfernung, Alter und Feldstärke.</p></aside><aside class="toolbar"><div><p class="kicker">Living Mandala</p><h2>Lingka</h2></div><button class="play"></button></aside><div class="timeline">Garten-Zeitachse</div></main><script>
const objects=[['drone','Drone','source',34,42,78,178,'#758656'],['tape','Tape','time',70,45,70,154,'#b57d2d'],['drift','Drift','motion',53,58,62,132,'#557486']].map(([id,label,family,x,y,size,r,c])=>({id,label,family,x,y,size,r,c,age:0}));const field=document.getElementById('field'),living=document.getElementById('living'),overlay=document.getElementById('overlay'),list=document.getElementById('list');function rel(){return[[objects[0],objects[1]],[objects[0],objects[2]],[objects[1],objects[2]]].map(([a,b])=>({a,b,d:Math.hypot(a.x-b.x,a.y-b.y),s:1-Math.hypot(a.x-b.x,a.y-b.y)/(a.r+b.r)})).sort((a,b)=>b.s-a.s)}function render(){list.innerHTML=objects.map(o=>`<div class="row"><span class="sigil" style="--c:${o.c}"></span><span><strong>${o.label}</strong><small>${o.family} · Alter ${Math.floor(o.age)}s</small></span></div>`).join('');living.innerHTML=rel().map((r,i)=>`<span class="distortion" style="--x:${(r.a.x+r.b.x)/2}%;--y:${(r.a.y+r.b.y)/2}%;--w:${Math.max(12,r.d*1.3)}%;--h:${Math.max(8,r.d*.55)}%;--a:${Math.atan2(r.b.y-r.a.y,r.b.x-r.a.x)*180/Math.PI}deg"></span>`).join('');overlay.innerHTML=objects.map(o=>`<g class="ring" style="--c:${o.c};transform-origin:${o.x}% ${o.y}%"><ellipse cx="${o.x}" cy="${o.y}" rx="${o.r/15}" ry="${o.r/22}"/><circle cx="${o.x}" cy="${o.y}" r="${o.r/25}"/></g>`).join('')+rel().map((r,i)=>{let cx=(r.a.x+r.b.x)/2+(r.b.y-r.a.y)*.08,cy=(r.a.y+r.b.y)/2-(r.b.x-r.a.x)*.08,d=`M ${r.a.x} ${r.a.y} Q ${cx} ${cy} ${r.b.x} ${r.b.y}`;return`<path class="thread" d="${d}" stroke="${i?'#375b6dad':'#a87023bd'}" stroke-width="${.1+r.s*.2}"/><path class="flow" d="${d}" stroke-width="${.05+r.s*.08}"/>`}).join('')}function ripple(o){let e=document.createElement('span');e.className='ripple';e.style.cssText=`--x:${o.x}%;--y:${o.y}%;--c:${o.c}`;living.appendChild(e);setTimeout(()=>e.remove(),2400)}objects.forEach(o=>{let b=document.createElement('button');b.className='node';b.style.cssText=`--x:${o.x}%;--y:${o.y}%;--s:${o.size}px;--c:${o.c}`;b.innerHTML='<span class="aura"></span><span class="presence"></span><span class="core"></span><span class="label">'+o.label+'</span><span class="family">'+o.family+'</span>';let off={x:0,y:0};b.onpointerdown=e=>{let r=field.getBoundingClientRect();off={x:e.clientX-r.left-o.x/100*r.width,y:e.clientY-r.top-o.y/100*r.height};b.setPointerCapture(e.pointerId)};b.onpointermove=e=>{if(!b.hasPointerCapture(e.pointerId))return;let r=field.getBoundingClientRect();o.x=Math.min(97,Math.max(3,(e.clientX-r.left-off.x)/r.width*100));o.y=Math.min(95,Math.max(5,(e.clientY-r.top-off.y)/r.height*100));b.style.setProperty('--x',o.x+'%');b.style.setProperty('--y',o.y+'%');ripple(o);render()};field.appendChild(b)});for(let i=0;i<26;i++){let p=document.createElement('i');p.style.cssText=`--x:${(13+i*29)%94}%;--y:${(19+i*37)%88}%;--c:${objects[i%3].c};--d:${18+i%7*3}s;--delay:${-(i%11)*1.9}s`;document.getElementById('pollen').appendChild(p)}setInterval(()=>{objects.forEach(o=>o.age++);render()},1000);render();
</script></body></html>
